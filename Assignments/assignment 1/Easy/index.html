<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikachu Landing Page</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="container">
    <!-- LEFT CONTENT -->
    <div class="left">
      <img
        class="logo"
        src="https://pngimg.com/uploads/pokemon_logo/pokemon_logo_PNG3.png"
        alt="pokemon"
      />

      <p class="sub-title">POKEMON GEN I</p>

      <h1 class="title">Pikachu</h1>

      <p class="desc">
        Pikachu is an Electric-type Pokémon introduced in Generation I.
        Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
        They are almost completely covered by yellow fur.
      </p>

      <div class="pagination">
        <div class="line"></div>
        <span>01 / 08</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="menu">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <img
        class="pikachu"
        src="./pikachu.png"
        alt="pikachu"
      />

      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <!-- POKEBALL -->
    <div class="pokeball"></div>
  </div>
</body>
</html>
