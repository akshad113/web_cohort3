<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Squid Game Landing Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <div class="ambient ambient-center"></div>

    <section class="hero-shell">
      <header class="topbar">
        <div class="brand-mark" aria-label="Squid Game logo">
          <span>SQUID</span>
          <span>GAME</span>
        </div>

        <nav class="nav">
          <a href="#">About</a>
          <a href="#" class="active">Watch now</a>
          <a href="#">Actors</a>
          <a href="#">Contact</a>
        </nav>

        <button class="menu-btn" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </header>

      <section class="hero">
        <div class="hero-copy">
          <div class="mini-logo" aria-hidden="true">
            <span>SQUID</span>
            <span>GAME</span>
          </div>

          <h1 class="title">
            <span>Squid</span>
            <span>Game</span>
          </h1>

          <p class="meta">
            Action / Thriller / Drama Series directed by Dong-hyuk Hwang
            <br />
            Season 1 · 9 Episodes
          </p>

          <div class="actions">
            <a class="btn btn-primary" href="#">
              <span class="play">▶</span>
              Play Now
            </a>
            <a class="btn btn-secondary" href="#">
              <span class="tri">▷</span>
              Watch Trailer
            </a>
          </div>
        </div>

        <div class="hero-visual">
          <div class="scroll-note">
            <span>SCROLL</span>
            <div class="scroll-line"></div>
          </div>

          <div class="hero-art" aria-hidden="true">
            <div class="hood"></div>
            <div class="hood-top"></div>
            <div class="head"></div>
            <div class="visor"></div>
            <div class="mask-square"></div>
            <div class="jacket"></div>
            <div class="zipper"></div>
            <div class="glove glove-left"></div>
            <div class="glove glove-right"></div>
          </div>

          <div class="side-word">SQUID</div>

          <ul class="socials" aria-label="Social links">
            <li>✦</li>
            <li>◌</li>
            <li>f</li>
          </ul>
        </div>
      </section>

      <section class="thumbs">
        <article class="thumb-card t1">
          <div class="thumb-art guards-art" aria-hidden="true">
            <div class="guard guard-left"></div>
            <div class="guard guard-center"></div>
            <div class="guard guard-right"></div>
            <div class="symbol symbol-left">◯</div>
            <div class="symbol symbol-center">□</div>
            <div class="symbol symbol-right">△</div>
          </div>
          <button class="thumb-play" aria-label="Play preview">▶</button>
        </article>

        <article class="thumb-card t2">
          <div class="thumb-art doll-art" aria-hidden="true">
            <div class="doll-head"></div>
            <div class="doll-hair doll-hair-left"></div>
            <div class="doll-hair doll-hair-right"></div>
            <div class="doll-body"></div>
            <div class="doll-face"></div>
          </div>
          <button class="thumb-play" aria-label="Play preview">▶</button>
        </article>

        <article class="thumb-card t3">
          <div class="thumb-art card-art" aria-hidden="true">
            <div class="card-shape"></div>
            <div class="card-symbol circle">◯</div>
            <div class="card-symbol square">□</div>
            <div class="card-symbol triangle">△</div>
          </div>
          <button class="thumb-play" aria-label="Play preview">▶</button>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
